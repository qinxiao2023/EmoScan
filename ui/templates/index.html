<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公共空间情绪预警系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC",
                "Noto Sans TC", "Segoe UI", Roboto, Arial, sans-serif;
            background: #f5f6f8;
            min-height: 100vh;
            color: #111827;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #111827;
        }

        .header h1 {
            font-size: 2.4rem;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.75;
        }

        .main-content {
            display: grid;
            grid-template-columns: 0.9fr 2fr 1.1fr;
            gap: 20px;
            margin-bottom: 20px;
            align-items: start;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 16px;
        }

        .video-section {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 20px;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            background: #000;
        }

        .video-feed {
            width: 100%;
            height: auto;
            display: block;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            background: #ffffff;
            color: #111827;
        }

        .btn-primary {
            background: #111827;
            color: #ffffff;
            border-color: #111827;
        }

        .btn-primary:hover {
            filter: brightness(0.95);
        }

        .btn-danger {
            background: #ffffff;
            color: #111827;
        }

        .btn-danger:hover {
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: #ffffff;
            color: #111827;
        }

        .btn-secondary:hover {
            filter: brightness(1.1);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stats-section {
            background: #ffffff;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid #e5e7eb;
        }

        .stats-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .emotion-stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .emotion-item {
            position: relative;
            display: grid;
            grid-template-columns: 84px 1fr 56px;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #f9fafb;
            border-radius: 10px;
            border: 1px solid #eef2f7;
            overflow: hidden;
        }

        .emotion-item::before {
            content: "";
            position: absolute;
            left: 10px;
            right: 10px;
            top: 50%;
            height: 10px;
            transform: translateY(-50%);
            border-radius: 999px;
            background: rgba(17,24,39,0.06);
            z-index: 0;
        }

        .emotion-bar {
            position: relative;
            height: 10px;
            border-radius: 999px;
            width: 0%;
            transition: width 0.35s ease;
            z-index: 1;
        }

        .emotion-name, .emotion-count {
            position: relative;
            z-index: 2;
        }

        .emotion-item:hover {
            border-color: #e5e7eb;
        }

        .emotion-name {
            font-weight: 600;
            text-transform: capitalize;
            opacity: 0.9;
        }

        .emotion-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            height: 26px;
            padding: 0 10px;
            border-radius: 999px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            color: #111827;
        }

        /* pastel colors for count bars */
        .b-happy { background: rgba(34,197,94,0.28); }
        .b-sad { background: rgba(59,130,246,0.22); }
        .b-angry { background: rgba(239,68,68,0.22); }
        .b-neutral { background: rgba(107,114,128,0.22); }
        .b-surprise { background: rgba(245,158,11,0.22); }
        .b-fear { background: rgba(168,85,247,0.20); }
        .b-disgust { background: rgba(20,184,166,0.20); }

        .toast {
            position: fixed;
            top: 18px;
            right: 18px;
            max-width: 360px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(185, 28, 28, 0.25);
            background: rgba(254, 226, 226, 0.95);
            color: #7f1d1d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            display: none;
            z-index: 9999;
        }

        .toast.show {
            display: block;
            animation: toastIn 0.18s ease-out;
        }

        @keyframes toastIn {
            from { transform: translateY(-6px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* low-saturation colors */
        .c-happy { background: rgba(110, 170, 120, 0.85); }
        .c-sad { background: rgba(120, 150, 190, 0.85); }
        .c-angry { background: rgba(190, 120, 120, 0.85); }
        .c-neutral { background: rgba(170, 170, 170, 0.75); }
        .c-surprise { background: rgba(190, 160, 110, 0.85); }
        .c-fear { background: rgba(150, 130, 190, 0.85); }
        .c-disgust { background: rgba(180, 150, 120, 0.85); }

        .alerts-section {
            background: #ffffff;
            border-radius: 14px;
            padding: 16px;
            border: 1px solid #e5e7eb;
        }

        .alerts-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.4px;
            margin-bottom: 12px;
            text-align: center;
        }

        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 460px;
            overflow: auto;
            padding-right: 4px;
        }

        .alert-item {
            display: grid;
            grid-template-columns: 72px 1fr;
            gap: 10px;
            padding: 10px 12px;
            background: #f9fafb;
            border: 1px solid #eef2f7;
            border-radius: 10px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 26px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.4px;
            border: 1px solid #e5e7eb;
            background: #ffffff;
        }

        .badge.l1 { color: #b45309; border-color: rgba(180,83,9,0.35); }
        .badge.l2 { color: #c2410c; border-color: rgba(194,65,12,0.35); }
        .badge.l3 { color: #b91c1c; border-color: rgba(185,28,28,0.35); }

        .alert-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .alert-top {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: baseline;
        }

        .alert-track {
            opacity: 0.8;
            font-variant-numeric: tabular-nums;
            font-size: 0.9rem;
        }

        .alert-msg {
            font-size: 0.95rem;
            line-height: 1.25rem;
            opacity: 0.95;
        }

        .alert-kpi {
            display: flex;
            gap: 10px;
            opacity: 0.75;
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
            flex-wrap: wrap;
        }

        .status-bar {
            background: #ffffff;
            border-radius: 14px;
            padding: 15px 20px;
            text-align: center;
            font-weight: 600;
            border: 1px solid #e5e7eb;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            background: #9ca3af;
            animation: pulse 2s infinite;
        }

        .status-indicator.active {
            background: #111827;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: rgba(17,24,39,0.7);
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid rgba(17,24,39,0.12);
            border-top: 3px solid rgba(17,24,39,0.75);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>公共空间情绪预警系统</h1>
            <p>辅助决策 + 人工复核</p>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="stats-section">
                    <h2 class="stats-title">表情统计（计数）</h2>
                    <div class="emotion-stats" id="emotionStats">
                        <div class="emotion-item" data-emotion="happy">
                            <span class="emotion-name">高兴</span>
                            <div class="emotion-bar b-happy" id="happyBar"></div>
                            <span class="emotion-count" id="happyCount">0</span>
                        </div>
                        <div class="emotion-item" data-emotion="sad">
                            <span class="emotion-name">难过</span>
                            <div class="emotion-bar b-sad" id="sadBar"></div>
                            <span class="emotion-count" id="sadCount">0</span>
                        </div>
                        <div class="emotion-item" data-emotion="angry">
                            <span class="emotion-name">愤怒</span>
                            <div class="emotion-bar b-angry" id="angryBar"></div>
                            <span class="emotion-count" id="angryCount">0</span>
                        </div>
                        <div class="emotion-item" data-emotion="neutral">
                            <span class="emotion-name">中性</span>
                            <div class="emotion-bar b-neutral" id="neutralBar"></div>
                            <span class="emotion-count" id="neutralCount">0</span>
                        </div>
                        <div class="emotion-item" data-emotion="surprise">
                            <span class="emotion-name">惊讶</span>
                            <div class="emotion-bar b-surprise" id="surpriseBar"></div>
                            <span class="emotion-count" id="surpriseCount">0</span>
                        </div>
                        <div class="emotion-item" data-emotion="fear">
                            <span class="emotion-name">恐惧</span>
                            <div class="emotion-bar b-fear" id="fearBar"></div>
                            <span class="emotion-count" id="fearCount">0</span>
                        </div>
                        <div class="emotion-item" data-emotion="disgust">
                            <span class="emotion-name">厌恶</span>
                            <div class="emotion-bar b-disgust" id="disgustBar"></div>
                            <span class="emotion-count" id="disgustCount">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="video-section panel">
                <div class="video-container">
                    <img id="videoFeed" class="video-feed" src="{{ url_for('video_feed') }}" alt="Video Feed">
                </div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>正在初始化摄像头…</p>
                </div>

                <div class="controls">
                    <button id="startBtn" class="btn btn-primary">开始</button>
                    <button id="stopBtn" class="btn btn-danger" disabled>停止</button>
                    <button id="saveBtn" class="btn btn-secondary">保存</button>
                    <button id="resetBtn" class="btn btn-secondary">重置</button>
                </div>
            </div>

            <div class="right-panel">
                <div class="alerts-section">
                    <div class="alerts-title">分级预警</div>
                    <div class="alerts-list" id="alertsList">
                        <!-- alerts injected here -->
                    </div>
                </div>

            </div>
        </div>

        <div class="status-bar">
            <span class="status-indicator" id="statusIndicator"></span>
            <span id="statusText">准备就绪</span>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // DOM elements
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const loading = document.getElementById('loading');
        const videoFeed = document.getElementById('videoFeed');
        const alertsList = document.getElementById('alertsList');
        const toast = document.getElementById('toast');

        const emotionCounts = {
            happy: document.getElementById('happyCount'),
            sad: document.getElementById('sadCount'),
            angry: document.getElementById('angryCount'),
            neutral: document.getElementById('neutralCount'),
            surprise: document.getElementById('surpriseCount'),
            fear: document.getElementById('fearCount'),
            disgust: document.getElementById('disgustCount'),
        };

        const emotionBars = {
            happy: document.getElementById('happyBar'),
            sad: document.getElementById('sadBar'),
            angry: document.getElementById('angryBar'),
            neutral: document.getElementById('neutralBar'),
            surprise: document.getElementById('surpriseBar'),
            fear: document.getElementById('fearBar'),
            disgust: document.getElementById('disgustBar'),
        };

        let statsInterval;
        let alertsInterval;
        let lastAlertsKey = '';

        // Event listeners
        startBtn.addEventListener('click', startDetection);
        stopBtn.addEventListener('click', stopDetection);
        saveBtn.addEventListener('click', saveLog);
        resetBtn.addEventListener('click', resetStats);

        // Functions
        async function startDetection() {
            try {
                showLoading(true);
                const response = await fetch('/start_detection', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    statusIndicator.classList.add('active');
                    statusText.textContent = '运行中';
                    // restart MJPEG stream AFTER starting detection
                    videoFeed.src = '/video_feed?ts=' + Date.now();
                    startStatsUpdate();
                    startAlertsUpdate();
                    showLoading(false);
                } else {
                    alert('错误：' + data.message);
                    showLoading(false);
                }
            } catch (error) {
                console.error('Error starting detection:', error);
                alert('启动失败');
                showLoading(false);
            }
        }

        async function stopDetection() {
            try {
                const response = await fetch('/stop_detection', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    statusIndicator.classList.remove('active');
                    statusText.textContent = '已停止';
                    videoFeed.src = '';
                    stopStatsUpdate();
                    stopAlertsUpdate();
                } else {
                    alert('错误：' + data.message);
                }
            } catch (error) {
                console.error('Error stopping detection:', error);
                alert('停止失败');
            }
        }

        async function saveLog() {
            try {
                const response = await fetch('/save_log', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert('已保存');
                } else {
                    alert('错误：' + data.message);
                }
            } catch (error) {
                console.error('Error saving log:', error);
                alert('保存失败');
            }
        }

        async function resetStats() {
            try {
                const response = await fetch('/reset_stats', { method: 'POST' });
                const data = await response.json();
                
                if (data.status === 'success') {
                    updateEmotionCounts({
                        happy: 0, sad: 0, angry: 0, neutral: 0, surprise: 0, fear: 0, disgust: 0
                    });
                    alert('已重置');
                } else {
                    alert('错误：' + data.message);
                }
            } catch (error) {
                console.error('Error resetting stats:', error);
                alert('重置失败');
            }
        }

        function startStatsUpdate() {
            statsInterval = setInterval(updateStats, 1000);
        }

        function stopStatsUpdate() {
            if (statsInterval) {
                clearInterval(statsInterval);
            }
        }

        async function updateStats() {
            try {
                const response = await fetch('/get_stats');
                const data = await response.json();
                
                if (data.status === 'success') {
                    updateEmotionCounts(data.emotion_counts || {});
                }
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }

        function updateEmotionCounts(counts) {
            const vals = Object.keys(emotionCounts).map(k => Number(counts[k] ?? 0)).filter(v => isFinite(v));
            const maxV = Math.max(1, ...vals);
            Object.keys(emotionCounts).forEach(emotion => {
                const v = Number(counts[emotion] ?? 0);
                if (emotionCounts[emotion]) {
                    emotionCounts[emotion].textContent = String(isFinite(v) ? Math.max(0, Math.floor(v)) : 0);
                }
                if (emotionBars[emotion]) {
                    const ratio = Math.max(0, Math.min(1, (isFinite(v) ? v : 0) / maxV));
                    emotionBars[emotion].style.width = (ratio * 100).toFixed(1) + '%';
                }
            });
        }

        let toastTimer = null;
        function showRedToast(text) {
            if (!toast) return;
            toast.textContent = text;
            toast.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        function startAlertsUpdate() {
            alertsInterval = setInterval(updateAlerts, 800);
        }

        function stopAlertsUpdate() {
            if (alertsInterval) {
                clearInterval(alertsInterval);
            }
        }

        function fmtTime(ts) {
            try {
                const d = new Date(ts * 1000);
                return d.toLocaleTimeString();
            } catch {
                return '';
            }
        }

        function levelBadge(level) {
            if (level === 1) return '<span class="badge l1">L1 黄</span>';
            if (level === 2) return '<span class="badge l2">L2 橙</span>';
            if (level === 3) return '<span class="badge l3">L3 红</span>';
            return '<span class="badge">L0</span>';
        }

        async function updateAlerts() {
            try {
                const response = await fetch('/get_alerts');
                const data = await response.json();
                if (data.status !== 'success') return;
                const alerts = data.alerts || [];

                const key = alerts.map(a => `${a.ts}-${a.level}-${a.track_id}-${a.z}`).join('|');
                if (key === lastAlertsKey) return;
                lastAlertsKey = key;

                if (alerts.length === 0) {
                    alertsList.innerHTML = '<div class="alert-item"><span class="badge">—</span><div class="alert-meta"><div class="alert-msg">暂无预警</div><div class="alert-kpi">等待数据输入…</div></div></div>';
                    return;
                }

                alertsList.innerHTML = alerts.slice(0, 20).map(a => {
                    const lvl = Number(a.level || 0);
                    const track = `T${a.track_id}`;
                    const t = fmtTime(a.ts);
                    const z = Number(a.z ?? 0).toFixed(2);
                    const risk = Number(a.risk ?? 0).toFixed(2);
                    const dur = Number(a.duration_sec ?? 0).toFixed(1);
                    const msg = (a.message || '').replace(/</g, '&lt;');

                    return `
                        <div class="alert-item">
                            ${levelBadge(lvl)}
                            <div class="alert-meta">
                                <div class="alert-top">
                                    <div class="alert-track">${t} · ${track}</div>
                                </div>
                                <div class="alert-msg">${msg}</div>
                                <div class="alert-kpi">risk ${risk} · z ${z} · 持续 ${dur}s</div>
                            </div>
                        </div>
                    `;
                }).join('');

                // floating toast for newest red alert
                const red = alerts.find(a => Number(a.level) === 3);
                if (red) {
                    const rid = `${red.ts}-${red.track_id}-${red.z}`;
                    if (!window.__lastRedId || window.__lastRedId !== rid) {
                        window.__lastRedId = rid;
                        showRedToast('红色预警：' + (red.message || '请立即人工复核'));
                    }
                }
            } catch (e) {
                console.error('Error updating alerts:', e);
            }
        }

        function showLoading(show) {
            if (show) {
                loading.classList.add('show');
                videoFeed.style.display = 'none';
            } else {
                loading.classList.remove('show');
                videoFeed.style.display = 'block';
            }
        }

        // Initialize stats on page load
        updateStats();
        updateAlerts();
    </script>
</body>
</html>
